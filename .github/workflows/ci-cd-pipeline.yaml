name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest Data-Pipeline/tests/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Deploy Airflow DAGs to GCS
        run: |
          gsutil cp -r Data-Pipeline/dags gs:///your-bucket-nameairflow-dags/
      
      - name: Deploy Streamlit app to Cloud Run
        run: |
          gcloud builds submit --tag gcr.io/your-project-id/streamlit-app
          gcloud run deploy streamlit-app --image gcr.io/your-project-id/streamlit-app --platform managed --region us-central1 --allow-unauthenticated
